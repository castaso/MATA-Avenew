<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATA Dashboard – Jargas Gabungan Weekly Ke-11 | KESDM</title>
  <meta name="description" content="Dashboard monitoring dan tracking progress pembangunan Jaringan Gas Bumi untuk Rumah Tangga – Minggu ke-11, Februari 2026. Mencakup 5 paket pekerjaan, 115.264 SR di seluruh Indonesia.">
  <meta name="theme-color" content="#080c14">
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="logo-badge">
        <div class="logo-icon">🔵</div>
        <span class="logo-text">MATA</span>
      </div>
      <div class="logo-sub">Monitoring & Tracking Activities<br>Dashboard Jargas Gabungan W-11</div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section">
        <div class="nav-section-title">Ringkasan</div>
        <button class="nav-item" data-page="overview" id="nav-overview">
          <span class="nav-icon">📊</span>
          <span>Overview Gabungan</span>
          <span class="nav-badge">5</span>
        </button>
      </div>

      <div class="nav-section" id="dynamic-nav">
        <!-- Dynamic sidebar items injected here -->
      </div>

    </nav>

    <div class="sidebar-footer">
      <div>Direktorat Perencanaan &amp;</div>
      <div>Pembangunan Infrastruktur Migas</div>
      <div style="margin-top:4px;color:var(--text-primary);font-weight:600">KEMENTERIAN ESDM</div>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════ -->
  <div class="main">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-title">
        <h1 id="topbar-title">Dashboard Gabungan – W11</h1>
        <p id="topbar-sub">Ringkasan seluruh paket pekerjaan Jargas</p>
      </div>
      <div class="topbar-chips">
        <button id="theme-toggle" class="chip" style="cursor:pointer; background:transparent; border-color:var(--border); color:var(--text-primary)">
          🌓 <span id="theme-label">Light Mode</span>
        </button>
        <span class="chip chip-blue">📅 28 Jan – 04 Feb 2026</span>
        <span class="chip chip-yellow">⏱ W11 of 34</span>
        <span class="chip chip-green">🏘️ 115.264 SR</span>
      </div>
    </header>

    <!-- Pages -->
    <main>

      <!-- Overview -->
      <section class="page" id="page-overview">
        <div style="display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--text-muted)">
          <span>Memuat data…</span>
        </div>
      </section>

      <!-- Dynamic Package Page -->
      <section class="page" id="page-package">
        <div id="package-content"></div>
      </section>

      <!-- Dynamic Location Page -->
      <section class="page" id="page-location">
        <div id="location-content"></div>
      </section>

    </main>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
